version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: reelgen-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7-alpine
    container_name: reelgen-redis
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    container_name: reelgen-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
volumes:
  mongo_data:
  minio_data:
